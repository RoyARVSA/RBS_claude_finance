name: RBS Signal Scanner

on:
  schedule:
    - cron: '*/15 * * * *'   # 每 15 分鐘
  workflow_dispatch:
    inputs:
      watchlist:
        description: '臨時覆蓋 watchlist（逗號分隔），留空使用 watchlist_state.json'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # 允許 workflow 把 watchlist_state.json commit 回 repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scanner-v2
          restore-keys: |
            ${{ runner.os }}-pip-scanner-

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run signal scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 手動觸發時可臨時覆蓋 watchlist（不會存入 state）
          WATCHLIST: ${{ github.event.inputs.watchlist }}
          # 每日 AI 晨報用（未設則晨報走純數據版，不會壞）
          LLM_API_KEY:  ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL:    ${{ secrets.LLM_MODEL }}
        run: python scan_signals.py

      - name: Commit updated watchlist state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add watchlist_state.json 2>/dev/null || true
          git diff --staged --quiet && echo "No state changes." || \
            git commit -m "chore: update watchlist_state.json [skip ci]"

      - name: Push state changes
        run: |
          # rebase-retry：避免非快進推送失敗導致 last_briefing_date 等狀態遺失（→ 晨報重複發送）
          for i in 1 2 3; do
            git push origin HEAD && exit 0
            echo "push 失敗，rebase 後重試 ($i)…"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          done
          git push origin HEAD || echo "push 最終失敗（狀態未持久化，下次可能重發）"

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: '*.log'
          if-no-files-found: ignore
          retention-days: 7
